name: Security Scan

on:

push:
branches:
- main

pull_request:
branches:
- main

jobs:

security:

```
runs-on: ubuntu-latest

steps:

  - uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Security Tools
    run: |
      python -m pip install --upgrade pip
      pip install bandit safety

  - name: Run Bandit
    run: |
      bandit -r .

  - name: Run Safety
    run: |
      safety check || true
```
