name: Greetings

on:
pull_request_target:
types: [opened]

issues:
types: [opened]

jobs:

greeting:

```
runs-on: ubuntu-latest

steps:

  - uses: actions/first-interaction@v1
    with:
      repo-token: ${{ secrets.GITHUB_TOKEN }}

      issue-message: |
        👋 Thank you for opening your first issue!

        We appreciate your contribution to Jarvis AI Assistant.

        Please make sure you've read the documentation and included all relevant information.

      pr-message: |
        🎉 Thank you for your first Pull Request!

        A maintainer will review your contribution as soon as possible.
```
