name: Documentation Check

on:

push:
paths:
- "**.md"

pull_request:
paths:
- "**.md"

jobs:

docs:

```
runs-on: ubuntu-latest

steps:

  - uses: actions/checkout@v4

  - name: Markdown Lint
    uses: DavidAnson/markdownlint-cli2-action@v17

  - name: Check Links
    uses: lycheeverse/lychee-action@v2
    with:
      fail: true
```
